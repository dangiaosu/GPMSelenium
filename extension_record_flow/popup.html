<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GPMSelenium Record & Flow</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: #0f172a;
        --line: #1e293b;
        --text: #f8fafc;
        --muted: #94a3b8;
        --green: #22c55e;
        --red: #ef4444;
        --blue: #38bdf8;
      }
      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
        font-size: 13px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 17px;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.35;
      }
      label {
        display: block;
        margin: 10px 0 5px;
        color: var(--muted);
        font-weight: 600;
      }
      input,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 10px;
        background: var(--panel);
        color: var(--text);
        outline: none;
      }
      textarea {
        min-height: 62px;
        resize: vertical;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 10px;
        background: #111827;
        color: var(--text);
        cursor: pointer;
        font-weight: 700;
      }
      button:hover {
        border-color: var(--blue);
      }
      button.primary {
        background: #064e3b;
        border-color: #047857;
      }
      button.danger {
        background: #450a0a;
        border-color: #991b1b;
      }
      button.grow {
        flex: 1;
      }
      #status {
        margin-top: 12px;
        padding: 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.8);
        color: var(--muted);
        min-height: 18px;
      }
      .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Record & Flow</h1>
    <p>Fallback recorder for mock scouting. Do not use real secrets or production data.</p>

    <label for="taskName">Task Name</label>
    <input id="taskName" type="text" value="example_task" spellcheck="false">

    <label for="taskDescription">Task Description</label>
    <textarea id="taskDescription" spellcheck="false" placeholder="Describe the automation flow."></textarea>

    <label for="requiredColumns">Required Excel Columns</label>
    <input id="requiredColumns" type="text" value="ProfileID, ProfileName" spellcheck="false">

    <div class="row">
      <button id="startButton" class="primary grow">Start</button>
      <button id="stopButton" class="danger grow">Stop</button>
    </div>

    <label for="checkpointNote">Checkpoint / Note</label>
    <textarea id="checkpointNote" spellcheck="false" placeholder="Example: What if wallet is already unlocked?"></textarea>
    <div class="row">
      <button id="addNoteButton" class="grow">Add Checkpoint</button>
      <button id="dumpButton" class="grow">Dump & Send</button>
    </div>

    <div id="status">Idle</div>
    <div class="hint">Server: http://localhost:9999/dump</div>
    <script src="popup.js"></script>
  </body>
</html>
